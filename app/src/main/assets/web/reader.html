<style>

.header.open ~ #htoggle{ opacity:0; pointer-events:none; }
.btn{ cursor:pointer; padding:5px 10px; border:1px solid rgba(180,154,106,.55); border-radius:8px; color:var(--zhu);

.coverleaf .dragon{ position:absolute; inset:0; background:url('plate/dragon-frame.png') center/100% 100% no-repeat;

.qianti.imperial{ background:linear-gradient(100deg,#f8f0d6,#f0e3b4); border-color:#b78f2c;

.c{ position:relative; display:inline-block; }

.col.title{ font-weight:600; } .col.title .c{ font-size:1.16em; }
.col.trans{ padding-top:2.2em; } .col.trans .c{ font-size:.6em; color:#5a4632; }
.col.fen{ padding-top:.6em; } .col.fen .c{ color:var(--zhu); font-size:.9em; }
.col.xu{ padding-top:.6em; } .col.xu .c{ font-family:'Wenkai','JGSong','HANA1','HANA2',serif; color:#6a5334; font-size:.86em; }
.col.xub .c{ font-family:'Wenkai','JGSong','HANA1','HANA2',serif; color:#4a3a26; }
.pc{ display:inline-block; writing-mode:vertical-rl; -webkit-writing-mode:vertical-rl; text-orientation:upright;
  width:1em; height:.5em; vertical-align:top; overflow:hidden; }
.pc>b{ display:block; font-size:.5em; line-height:1; font-weight:normal; color:#4a3a26; }
.pc>b.gxn::before{ content:""; display:inline-block; width:.72em; height:.72em; border:1px solid #b08a5a; box-sizing:border-box; }
.gx{ display:inline-block; position:relative; }
.gx::before{ content:""; display:inline-block; width:.66em; height:.66em; border:1px solid #b08a5a; box-sizing:border-box; margin:.17em; vertical-align:middle; }
#toast{ position:fixed; left:50%; bottom:22px; transform:translateX(-50%); background:rgba(60,40,20,.9); color:#f6efe1;
  padding:8px 16px; border-radius:20px; font-family:sans-serif; font-size:14px; display:none; z-index:30; }
.kbd{ position:fixed; right:52px; bottom:8px; font-family:sans-serif; font-size:11px; color:#9a805a; background:rgba(239,228,203,.82); padding:2px 8px; border-radius:6px; }
@media (max-width:560px){ .hby,.kbd{ display:none; } .reading .rail{ display:none; } }

<script>window.setSafe=function(t,r,b,l){var s=document.documentElement.style;s.setProperty("--safe-top",t+"px");s.setProperty("--safe-right",r+"px");s.setProperty("--safe-bottom",b+"px");s.setProperty("--safe-left",l+"px");requestAnimationFrame(function(){if(window.apply)apply();});};
var qs=new URLSearchParams(location.search); var TID=qs.get('t')||'T0235'; var JN=qs.get('j')||null;
var N=parseInt(qs.get('n'))||17; var META=null, DATA=null, XR=[];
var SHOWNOTE=localStorage.getItem('cbeta_note')!=='0';
var BRK='（）()〔〕【】《》〈〉「」『』';
function $(id){ return document.getElementById(id); }
function stripBr(s){ s=(s||'').replace(/[（(〔【\[][^）)〕】\]]*[）)〕】\]]/g,'').replace(/[（(）)〔〕【】\[\]「」『』《》〈〉]/g,'').trim(); return s; }
function addCol(su,cls){ var c=document.createElement('div'); c.className='col'+(cls?(' '+cls):''); su.appendChild(c); return c; }
function addC(col,ch,m){ var s=document.createElement('span'); s.className='c'+(m?(' '+m):''); s.textContent=(BRK.indexOf(ch)>=0?'':ch); col.appendChild(s); }
function pushNoteCells(cells,txt){ var a=Array.from(txt).filter(function(c){return BRK.indexOf(c)<0;}),L=a.length,h=Math.ceil(L/2); for(var k=0;k<h;k++) cells.push({k:'pc',r:a[k],l:(a[k+h]||'')}); }
function pcCell(ch){ var b=document.createElement('b'); if(ch==='□') b.className='gxn'; else b.textContent=ch; return b; }
function addPC(col,r,l){ var pc=document.createElement('span'); pc.className='pc';
  pc.appendChild(pcCell(r)); pc.appendChild(pcCell(l||'')); col.appendChild(pc); }
function addGaiji(col,formula){ var g=document.createElement('span'); g.className='gx'; g.title='缺字：'+formula; col.appendChild(g); }
function inXr(i){ for(var k=0;k<XR.length;k++){ if(i>=XR[k][0]&&i<XR[k][1]) return true; } return false; }
// 偈颂检测: 触发词(偈言/頌曰…)后 连续≥3 段等长(4-7字)句读切分 → 每句换列。返回换列位置 map
function detectVerses(text, ju, dou){
  var brk={}, L=text.length, ends=[];
  for(var i=0;i<L;i++) if(ju[i]||dou[i]) ends.push(i);
  if(ends.length<4) return brk;
  var segs=[], prev=0;
  for(var k=0;k<ends.length;k++){ segs.push([prev, ends[k]-prev+1]); prev=ends[k]+1; }
  var trig=[], re=/偈言|偈頌|頌曰|偈曰|而說偈|宣此義|以偈|說偈|重頌|偈答|偈問/g, m;
  while((m=re.exec(text))) trig.push(m.index+m[0].length);
  function near(p){ for(var q=0;q<trig.length;q++){ var dd=p-trig[q]; if(dd>=0&&dd<=6) return true; } return false; }
  var i=0,n=segs.length;
  while(i<n){ var Lm=segs[i][1];
    if(Lm>=4&&Lm<=7&&near(segs[i][0])){ var j=i+1; while(j<n&&segs[j][1]===Lm) j++;
      if(j-i>=3){ for(var kk=i;kk<j;kk++) brk[segs[kk][0]]=1; i=j; continue; } }
    i++; }
  return brk;
}
// 敬空抬头: 仅在序区间(xr)或御製经内, 荣衔前空一格(溢出列则自然抬头)
function detectJing(text, XR, imperial){
  var pos={}, re=/皇帝|陛下|天子|聖躬|世尊|如來|菩薩|佛/g, m;
  while((m=re.exec(text))){ var p=m.index, ok=imperial;
    if(!ok&&XR) for(var k=0;k<XR.length;k++){ if(p>=XR[k][0]&&p<XR[k][1]){ ok=true; break; } }
    if(ok) pos[p]=1; }
  return pos;
}
function render(){
  var su=$('sutra'); su.innerHTML=''; if(!DATA) return;
  var ju={}, dou={}, fenAt={}, brSet={}; XR=DATA.xr||[];
  DATA.ju.forEach(function(i){ ju[i]=1; }); DATA.dou.forEach(function(i){ dou[i]=1; });
  DATA.fen.forEach(function(f,idx){ (fenAt[f[0]]=fenAt[f[0]]||[]).push([f[1], f[2]||'fen', idx]); });
  (DATA.br||[]).forEach(function(i){ brSet[i]=1; });
  var noteAt={}; if(SHOWNOTE) (DATA.note||[]).forEach(function(nt){ (noteAt[nt[0]]=noteAt[nt[0]]||[]).push(nt[1]); });
  var gxSet={}; (DATA.gx||[]).forEach(function(g){ gxSet[g[0]]=g[1]; });
  if(DATA.juan===META.juans[0]){
    if(STYLE.cover) addCover(su);                  // 整经卷首最前: 書衣·題簽封面
    addPlate(su,'kaijing');                        // 開經偈牌记页
    var tt=Array.from(stripBr(DATA.title)||DATA.title); var tN=Math.max(1,Math.round(N/1.16)); for(var to=0;to<tt.length;to+=tN){ var ct=addCol(su,'title'); for(var k=to;k<Math.min(to+tN,tt.length);k++) addC(ct,tt[k]); }
    if(DATA.by){ var bb=Array.from(stripBr(DATA.by)); var cb=addCol(su,'trans'); for(var k2=0;k2<bb.length;k2++) addC(cb,bb[k2]); }
  }
  var t=Array.from(DATA.text), cells=[];
  var vbrk = STYLE.verse ? detectVerses(DATA.text, ju, dou) : null;   // 偈颂每句换列位置
  var jing = STYLE.jing ? detectJing(DATA.text, XR, /御製|御制/.test(DATA.title||'')) : null;  // 敬空位置
  if(noteAt[-1]) noteAt[-1].forEach(function(x){ pushNoteCells(cells,x); });
  for(var i=0;i<t.length;i++){
    if(fenAt[i]) cells.push({k:'fen',i:i});
    else if(brSet[i]) cells.push({k:'br'});
    else if(vbrk&&vbrk[i]) cells.push({k:'vbr'});
    if(jing&&jing[i]) cells.push({k:'sp'});          // 敬空(字前空格, 不换列)
    cells.push({k:'c',ch:t[i],m:ju[i]?'ju':(dou[i]?'dou':''),i:i});
    var nts=noteAt[i]; if(nts) nts.forEach(function(x){ pushNoteCells(cells,x); });
  }
  var col=null,cnt=0,curxr=false,foldN=0,nextVerse=false;
  for(var ci=0;ci<cells.length;ci++){
    var ce=cells[ci];
    if(ce.k==='fen'){ fenAt[ce.i].forEach(function(pr){ var cf=addCol(su,pr[1]); cf.id='fen'+pr[2]; var fl=Array.from(stripBr(pr[0])||pr[0]); for(var z=0;z<fl.length;z++) addC(cf,fl[z]); }); col=null; cnt=0; continue; }
    if(ce.k==='br'){ col=null; cnt=0; continue; }
    if(ce.k==='vbr'){ col=null; cnt=0; nextVerse=true; continue; }   // 偈句换列
    if(ce.k==='sp'){ if(col&&cnt>0&&cnt+1<=N+0.01){ addC(col,'　'); cnt+=1; } continue; }   // 敬空(溢出则跳过→荣衔抬到下列顶)
    if(ce.k==='c') curxr=inXr(ce.i);
    var w=(ce.k==='pc')?0.5:1;
    if(!col||(cnt>0&&cnt+w>N+0.01)){ col=addCol(su, curxr?'xub':''); cnt=0; if(nextVerse){ col.classList.add('verse'); nextVerse=false; } if((++foldN)%6===0) col.classList.add('fold'); }
    if(ce.k==='c'){ if(col.getAttribute('data-ci')===null) col.setAttribute('data-ci',ce.i); if(gxSet[ce.i]!==undefined) addGaiji(col,gxSet[ce.i]); else addC(col,ce.ch,ce.m); } else addPC(col,ce.r,ce.l);
    cnt+=w;
  }
  if(DATA.juan===META.juans[META.juans.length-1]) addPlate(su,'huixiang');  // 整经卷末: 迴向偈牌记页
  sizeFont();
}
function addPlate(su,name){ var w=document.createElement('div'); w.className='pcol';
  var s=$('scroll'); if(s) w.style.width=s.clientWidth+'px';
  var im=document.createElement('img'); im.src='plate/'+name+'.png'; im.alt='';
  im.addEventListener('load',function(){ try{ sizeFont(); goPos(); }catch(e){} });
  w.appendChild(im); su.appendChild(w); }
function addCover(su){ var w=document.createElement('div'); w.className='pcol cover';
  var s=$('scroll'); if(s) w.style.width=s.clientWidth+'px';
  var leaf=document.createElement('div'); leaf.className='coverleaf';
  var title=stripBr(DATA.title)||DATA.title||'';
  var imperial=/御製|御制/.test(title);            // 御製经: 云龙版框 + 金题签
  if(imperial){ var dg=document.createElement('div'); dg.className='dragon'; leaf.appendChild(dg); }
  var qt=document.createElement('div'); qt.className='qianti'+(imperial?' imperial':''); qt.textContent=title; qt.setAttribute('data-n',Array.from(title).length);
  leaf.appendChild(qt);                            // 書衣封面只题经名(译人在卷首正文)
  w.appendChild(leaf); su.appendChild(w); }
function fitCover(){ var lf=$('sutra').querySelector('.coverleaf'); if(!lf) return;
  var qt=lf.querySelector('.qianti'); if(!qt) return;
  var H=lf.clientHeight, W=lf.clientWidth, n=parseInt(qt.getAttribute('data-n'))||4;
  var fs=Math.min(H*0.60/Math.max(n,3), W*0.15); qt.style.fontSize=Math.round(fs)+'px';
  var yz=lf.querySelector('.coveryz'); if(yz) yz.style.fontSize=Math.max(12,Math.round(fs*0.32))+'px'; }
function sizeFont(){ var su=$('sutra'); var sc=$('scroll'), fr=su.parentElement; if(sc&&fr) fr.style.height=(sc.clientHeight-28)+'px';
  fitPlates(); fitCover();
  var col=su.querySelector('.col:not(.title):not(.trans):not(.fen):not(.xu)')||su.querySelector('.col');
  if(!col) return; su.style.fontSize=Math.floor(col.clientHeight/N*0.985)+'px'; goPos(); }
function fitPlates(){ var su=$('sutra'), fr=su&&su.parentElement, s=$('scroll'); if(!fr||!s) return;
  var H=su.clientHeight, W=s.clientWidth; if(H<=0||W<=0) return;   // sutra 内容高(含天地 padding)
  var imgs=su.querySelectorAll('.pcol img');
  for(var i=0;i<imgs.length;i++){ var im=imgs[i]; var iw=im.naturalWidth||1080, ih=im.naturalHeight||1440;
    var k=Math.min(W/iw, H/ih); im.style.width=Math.round(iw*k)+'px'; im.style.height=Math.round(ih*k)+'px';
    if(im.parentElement) im.parentElement.style.width=W+'px'; } }
function fit(){ document.body.style.height=window.innerHeight+'px'; }
// —— 阅读位置自动保存/恢复(每本书一条, 按字符索引, 跨字数/字体重排有效) ——
function getPos(){ try{return JSON.parse(localStorage.getItem('cbeta_pos')||'{}');}catch(e){return {};} }
function curCI(){ var s=$('scroll'),su=$('sutra'); if(!s||!su) return null;
  var sr=s.getBoundingClientRect(), cols=su.querySelectorAll('.col[data-ci]'), best=null,bd=1e9;
  for(var i=0;i<cols.length;i++){ var r=cols[i].getBoundingClientRect();
    if(r.right<=sr.right+2 && r.right>sr.left){ var d=sr.right-r.right; if(d<bd){bd=d;best=cols[i];} } }
  if(!best && cols.length) best=cols[0];
  return best?parseInt(best.getAttribute('data-ci')):null; }
function savePos(){ if(!DATA) return; var ci=curCI(); if(ci==null) return;
  var p=getPos(); p[TID]={jn:DATA.juan,ci:ci,ti:(stripBr(DATA.title)||DATA.title||''),t:Date.now()};
  try{localStorage.setItem('cbeta_pos',JSON.stringify(p));}catch(e){} }
function scrollToCI(ci){ var s=$('scroll'),su=$('sutra'); if(!s) return false;
  var cols=su.querySelectorAll('.col[data-ci]'), target=null;
  for(var i=0;i<cols.length;i++){ if(parseInt(cols[i].getAttribute('data-ci'))<=ci) target=cols[i]; else break; }
  if(!target) return false;
  var sr=s.getBoundingClientRect(), tr=target.getBoundingClientRect(); s.scrollLeft += (tr.right-sr.right); return true; }
function goPos(){ var sp=getPos()[TID];
  if(sp && DATA && sp.jn===DATA.juan && sp.ci>0){ if(scrollToCI(sp.ci)) return; }
  toStart(); }
function toStart(){ var s=$('scroll'), su=$('sutra'); if(!s) return;
  s.scrollLeft=s.scrollWidth;                       // Blink/Android WebView: 起点=正max
  var first=su&&su.firstElementChild;                // 真正的阅读起点(可能是開經偈牌记页 .pcol, 也可能是首列). 引擎无关校正: iOS/WebKit 的 vertical-rl scrollLeft 取向相反, s.scrollLeft=sw 会钳到错端→停在大片空白
  if(first){ var sr=s.getBoundingClientRect(), fr=first.getBoundingClientRect();
    if(sr.right-fr.right>s.clientWidth*0.5){ first.scrollIntoView({block:'start',inline:'nearest'}); } } }
function apply(){ fit(); sizeFont(); requestAnimationFrame(function(){ sizeFont(); goPos(); requestAnimationFrame(goPos); });
  if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(function(){ sizeFont(); goPos(); }); }
  setTimeout(function(){ sizeFont(); goPos(); },300); }   // 移动端迟到 reflow(地址栏/慢字体) 再钉一次
function scrollToEl(el){ var s=$('scroll'); var sr=s.getBoundingClientRect(), er=el.getBoundingClientRect(); s.scrollLeft += (er.right - sr.right); }
function colW(){ var c=$('sutra').querySelector('.col:not(.title):not(.trans)'); return c?c.getBoundingClientRect().width:42; }
function pageMove(dir){ var s=$('scroll'); var cw=colW()||42; var cols=Math.max(1,Math.floor(s.clientWidth*0.86/cw)); s.scrollLeft += dir*cols*cw; }
function buildNav(){
  var n=$('nav'); var idx=META.juans.indexOf(DATA.juan); var h='';
  if(META.juans.length>1){
    h+=(idx>0?'<b onclick="go(\''+META.juans[idx-1]+'\')">‹卷</b>':'');
    h+='<span class="juan">卷'+parseInt(DATA.juan)+'/'+META.juans.length+'</span>';
    h+=(idx<META.juans.length-1?'<b onclick="go(\''+META.juans[idx+1]+'\')">卷›</b>':'');
  }
  h+=' <b '+(N==15?'class=on':'')+' onclick="setN(15)">15</b><b '+(N==17?'class=on':'')+' onclick="setN(17)">17</b><b '+(N==20?'class=on':'')+' onclick="setN(20)">20</b>';
  n.innerHTML=h;
}
function buildToc(){
  var t=$('toc'); var h='<a href="index.html">◇ 回總目錄</a>';
  if(META.juans.length>1){ h+='<div class="hd">卷</div>'; META.juans.forEach(function(j){
    h+='<div class="ti" onclick="go(\''+j+'\');closeToc()">卷 '+parseInt(j)+(j===DATA.juan?' ·當前':'')+'</div>'; }); }
  var fens=DATA.fen||[];
  if(fens.length){ h+='<div class="hd">品／科判</div>'; fens.forEach(function(f,idx){
    h+='<div class="ti '+(f[2]||'fen')+'" onclick="jumpFen('+idx+')">'+f[1]+'</div>'; }); }
  t.innerHTML=h;
}
window.jumpFen=function(idx){ var el=$('fen'+idx); if(el) scrollToEl(el); closeToc(); };
window.go=function(jn){ JN=jn; loadJuan(); };
window.setN=function(x){ savePos(); N=x; buildNav(); render(); apply(); };
window.closeToc=function(){ $('toc').style.display='none'; };
$('tocbtn').addEventListener('click',function(e){ e.stopPropagation(); $('fontmenu').style.display='none'; var t=$('toc'); t.style.display=(t.style.display==='none'?'block':'none'); });
// 工具栏 收起/展开 (默认收起)
function toggleBar(force){ var h=$('header'); var open=(force!=null)?force:!h.classList.contains('open');
  h.classList.toggle('open',open); if(!open){ closeToc(); $('fontmenu').style.display='none'; } }
$('htoggle').addEventListener('click',function(e){ e.stopPropagation(); toggleBar(true); });
$('hclose').addEventListener('click',function(e){ e.stopPropagation(); toggleBar(false); });
$('scroll').addEventListener('click',function(){ if($('header').classList.contains('open')) toggleBar(false); });
document.addEventListener('click',function(e){
  if(!$('toc').contains(e.target)&&e.target!==$('tocbtn')) closeToc();
  if(!$('fontmenu').contains(e.target)&&e.target!==$('fontbtn')) $('fontmenu').style.display='none';
  if(!$('stylemenu').contains(e.target)&&e.target!==$('stylebtn')) $('stylemenu').style.display='none';
});
// 字體切換
var FONTS=[['jh','JHSong','京華老宋体'],['hw','HW','汇文明朝体'],['qj','QJ','令东齐伋体·明刻本'],['nt','JGSong','思源宋体'],['wk','Wenkai','霞鹜文楷']];
function curFont(){ return localStorage.getItem('cbeta_font')||'jh'; }
function applyFont(){ var id=curFont(); var f=null; for(var i=0;i<FONTS.length;i++){ if(FONTS[i][0]===id) f=FONTS[i]; } if(!f) f=FONTS[0];
  document.documentElement.style.setProperty('--bf', "'"+f[1]+"'"); }
function buildFontMenu(){ var m=$('fontmenu'); var cur=curFont(); var h='<div class="hd">正文字體</div>';
  FONTS.forEach(function(f){ h+='<div class="ti" onclick="setFont(\''+f[0]+'\')">'+(f[0]===cur?'● ':'○ ')+f[2]+'</div>'; });
  h+='<div class="hd" style="border:none;color:#8a6a3a;font-weight:400">序文恒用楷体</div>'; m.innerHTML=h; }
window.setFont=function(id){ savePos(); localStorage.setItem('cbeta_font',id); applyFont(); buildFontMenu(); $('fontmenu').style.display='none';
  if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(function(){ apply(); }); }
  [120,450,1000].forEach(function(t){ setTimeout(apply,t); }); };
$('fontbtn').addEventListener('click',function(e){ e.stopPropagation(); closeToc(); $('stylemenu').style.display='none'; buildFontMenu(); var m=$('fontmenu'); m.style.display=(m.style.display==='none'?'block':'none'); });
applyFont();
// 版式（纯视觉预制格式：天头地脚 / 经折折痕 / 乌丝栏）
function loadStyle(){ try{return JSON.parse(localStorage.getItem('cbeta_style')||'{}');}catch(e){return {};} }
var STYLE=Object.assign({tiandi:true, rule:'normal', folds:true, cover:true, coverImg:'cover-cichi.jpg', verse:true, jing:false}, loadStyle());
function saveStyle(){ try{localStorage.setItem('cbeta_style',JSON.stringify(STYLE));}catch(e){} }
function applyStyle(){ var r=document.documentElement.style;
  r.setProperty('--pt', STYLE.tiandi?'16px':'9px'); r.setProperty('--pb', STYLE.tiandi?'6px':'9px');
  var rm={off:'transparent',weak:'rgba(120,90,50,.12)',normal:'rgba(120,90,50,.22)',strong:'rgba(120,90,50,.40)'};
  r.setProperty('--rule', rm[STYLE.rule]||rm.normal);
  r.setProperty('--coverimg', "url('plate/"+(STYLE.coverImg||'cover-cichi.jpg')+"')");
  document.body.classList.toggle('folds', !!STYLE.folds); }
function buildStyleMenu(){ var m=$('stylemenu'); var h='<div class="hd">版式</div>';
  h+='<div class="ti" onclick="tglStyle(\'cover\')">'+(STYLE.cover?'☑':'☐')+' 書衣封面（卷首）</div>';
  h+='<div class="ti" onclick="tglStyle(\'tiandi\')">'+(STYLE.tiandi?'☑':'☐')+' 天头地脚留白</div>';
  h+='<div class="ti" onclick="tglStyle(\'folds\')">'+(STYLE.folds?'☑':'☐')+' 经折·折痕</div>';
  h+='<div class="ti" onclick="tglStyle(\'verse\')">'+(STYLE.verse?'☑':'☐')+' 偈颂另排（每句换行）</div>';
  h+='<div class="ti" onclick="tglStyle(\'jing\')">'+(STYLE.jing?'☑':'☐')+' 敬空抬头（序/御製内）</div>';
  if(STYLE.cover){ h+='<div class="hd" style="border:none;color:#8a6a3a;font-weight:400">書衣配色</div>';
    [['cover-cichi.jpg','磁青'],['cover-ciqing.jpg','瓷青']].forEach(function(c){
      h+='<div class="ti" onclick="setCover(\''+c[0]+'\')">'+(STYLE.coverImg===c[0]?'● ':'○ ')+c[1]+'</div>'; }); }
  h+='<div class="hd" style="border:none;color:#8a6a3a;font-weight:400">乌丝栏（界行）</div>';
  ['off','weak','normal','strong'].forEach(function(v){ var lbl={off:'无',weak:'淡',normal:'常',strong:'重'}[v];
    h+='<div class="ti" onclick="setRule(\''+v+'\')">'+(STYLE.rule===v?'● ':'○ ')+lbl+'</div>'; });
  m.innerHTML=h; }
window.tglStyle=function(k){ if(k==='tiandi'||k==='cover'||k==='verse'||k==='jing') savePos(); STYLE[k]=!STYLE[k]; saveStyle(); applyStyle(); buildStyleMenu();
  if(k==='cover'||k==='verse'||k==='jing'){ render(); apply(); } else if(k==='tiandi'){ apply(); } };
window.setRule=function(v){ STYLE.rule=v; saveStyle(); applyStyle(); buildStyleMenu(); };
window.setCover=function(img){ STYLE.coverImg=img; saveStyle(); applyStyle(); buildStyleMenu(); };
$('stylebtn').addEventListener('click',function(e){ e.stopPropagation(); closeToc(); $('fontmenu').style.display='none'; buildStyleMenu(); var m=$('stylemenu'); m.style.display=(m.style.display==='none'?'block':'none'); });
applyStyle();
// 夾註開關
function syncNote(){ $('notebtn').style.color=SHOWNOTE?'#c0392b':'#9a805a'; $('notebtn').title=SHOWNOTE?'夾註：顯示（點擊隱藏）':'夾註：隱藏（點擊顯示）'; }
$('notebtn').addEventListener('click',function(){ savePos(); SHOWNOTE=!SHOWNOTE; localStorage.setItem('cbeta_note',SHOWNOTE?'1':'0'); syncNote(); render(); apply(); });
syncNote();
// 書籤
function getBm(){ try{return JSON.parse(localStorage.getItem('cbeta_bm')||'[]');}catch(e){return[];} }
function toast(s){ var t=$('toast'); t.textContent=s; t.style.display='block'; setTimeout(function(){t.style.display='none';},1600); }
$('bmbtn').addEventListener('click',function(){ var bm=getBm(); var key=TID+'/'+DATA.juan;
  var ex=bm.some(function(x){return x.k===key;});
  if(ex){ bm=bm.filter(function(x){return x.k!==key;}); toast('已移除書籤'); }
  else{ bm.unshift({k:key,t:TID,j:DATA.juan,title:DATA.title,juan:parseInt(DATA.juan)}); toast('★ 已加入書籤'); }
  localStorage.setItem('cbeta_bm',JSON.stringify(bm.slice(0,300))); syncBm();
});
function syncBm(){ var bm=getBm(); var on=bm.some(function(x){return x.k===TID+'/'+(DATA?DATA.juan:JN);}); $('bmbtn').textContent=on?'★':'☆'; $('bmbtn').style.color=on?'#c0392b':''; }
function cnum(n){ n=parseInt(n)||1; var d='〇一二三四五六七八九';
  if(n<10) return d[n]; if(n===10) return '十'; if(n<20) return '十'+d[n-10];
  if(n<100){ var t=Math.floor(n/10),o=n%10; return d[t]+'十'+(o?d[o]:''); } return ''+n; }
function setEars(){ var s=(stripBr(DATA.title)||DATA.title).slice(0,9)+' 卷'+cnum(DATA.juan);
  $('earL').textContent=s; $('earR').textContent=s; }
function loadJuan(){
  fetch('data/'+TID+'/'+JN+'.json').then(function(r){return r.json();}).then(function(d){
    DATA=d; $('jtitle').textContent=stripBr(d.title)||d.title; $('jby').textContent=d.by||'';
    document.title=(stripBr(d.title)||d.title)+' · CBETA'; buildNav(); buildToc(); setEars(); render(); apply(); syncBm();
  }).catch(function(e){ $('jtitle').textContent='載入失敗'; });
}
fetch('data/'+TID+'/_meta.json').then(function(r){return r.json();}).then(function(m){ META=m; if(!JN){ var sp=getPos()[TID]; JN=(sp&&sp.jn&&m.juans.indexOf(sp.jn)>=0)?sp.jn:m.juans[0]; } loadJuan(); });
// 自动保存阅读位置(滚动防抖 + 定时 + 隐藏/离开)
var _svT; if($('scroll')) $('scroll').addEventListener('scroll',function(){ clearTimeout(_svT); _svT=setTimeout(savePos,700); });
setInterval(function(){ if(!document.hidden) savePos(); },5000);
window.addEventListener('pagehide',savePos);
document.addEventListener('visibilitychange',function(){ if(document.hidden) savePos(); });
// 鍵盤 & 滾輪(整列翻, 消除半列切割)
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='ArrowDown'||e.key==='PageDown'||e.key===' '){ pageMove(-1); e.preventDefault(); }
  else if(e.key==='ArrowRight'||e.key==='ArrowUp'||e.key==='PageUp'){ pageMove(1); e.preventDefault(); }
  else if(e.key==='Home'){ toStart(); }
});
$('scroll').addEventListener('wheel',function(e){ if(Math.abs(e.deltaY)>=Math.abs(e.deltaX)){ this.scrollLeft-=e.deltaY; e.preventDefault(); } },{passive:false});
window.addEventListener('resize',apply); window.addEventListener('orientationchange',function(){ setTimeout(apply,220); });
if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(apply); }
[300,800,1500].forEach(function(t){ setTimeout(function(){ if(DATA) apply(); },t); });
if(window.ResizeObserver){ var ro=new ResizeObserver(function(){ toStart(); }); ro.observe($('scroll')); ro.observe($('sutra')); }
</script>
